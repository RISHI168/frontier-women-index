name: Weekly Citation Snapshot

on:
  schedule:
    # Runs every Monday at 02:00 UTC
    - cron: "0 2 * * 1"
  workflow_dispatch: # Allow manual triggering from Actions tab

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Collect citation snapshots
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: python scripts/collect_signals.py

      - name: Create PR with updated signals
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(signals): weekly citation snapshot"
          title: "Weekly signal snapshot ${{ github.run_number }}"
          body: |
            Automated weekly citation snapshot from Semantic Scholar.

            This PR appends the latest citation counts for each leader to
            `signals/scholar_deltas.csv`. A human reviewer should confirm there
            are no anomalies (e.g., sudden drops, missing authors) before merging.

            Generated by `.github/workflows/weekly-signals.yml`.
          branch: signals/weekly-snapshot-${{ github.run_number }}
          delete-branch: true
          labels: |
            automation
            signals
