summary: >
  Jennifer Doudna shared the 2020 Nobel Prize in Chemistry with Emmanuelle Charpentier
  for the development of CRISPR-Cas9 genome editing, a breakthrough that made it
  possible to edit DNA with unprecedented precision. She founded the Innovative
  Genomics Institute at UC Berkeley in 2014 and serves as its President, directing
  a program that has spun out multiple CRISPR-based therapeutics companies and now
  coordinates an international effort to make gene therapies affordable and widely
  accessible. Her 2012 paper with Charpentier in Science is one of the most cited
  papers in modern biology, and in 2026 she received the American Chemical Society's
  Priestley Medal in recognition of her sustained scientific leadership.
